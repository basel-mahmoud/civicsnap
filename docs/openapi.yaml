openapi: 3.1.0
info:
  title: CivicSnap Edge API
  version: 1.0.0
  description: >
    Server-side endpoints. Data CRUD is performed directly against Supabase
    PostgREST under Row Level Security; this contract covers the custom edge
    function. Auth is a Supabase JWT (verify_jwt enabled).
servers:
  - url: https://kyhvkqlutdclzxpgcuzu.supabase.co/functions/v1
paths:
  /classify-photo:
    post:
      summary: Classify a civic-issue photo with Gemini vision
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [image_base64]
              properties:
                image_base64:
                  type: string
                  description: Base64 JPEG/PNG/WEBP, <= 7,000,000 chars.
                media_type:
                  type: string
                  enum: [image/jpeg, image/png, image/webp]
      responses:
        '200':
          description: Classification result
          content:
            application/json:
              schema:
                type: object
                required: [category, severity, title, description, confidence, is_valid_issue]
                properties:
                  is_valid_issue: { type: boolean }
                  category:
                    type: string
                    enum: [pothole, streetlight, graffiti, trash, water, sign, sidewalk, other]
                  severity: { type: string, enum: [low, medium, high] }
                  title: { type: string, maxLength: 140 }
                  description: { type: string, maxLength: 2000 }
                  confidence: { type: number, minimum: 0, maximum: 1 }
        '400': { description: Invalid input }
        '413': { description: Image too large }
        '429': { description: Rate limit exceeded }
        '502': { description: Upstream AI error }
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
